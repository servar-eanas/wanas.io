<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
  <h2>تسجيل الدخول</h2>

  <input type="text" id="name" minlength="3" placeholder="الاسم">

  <input type="email" id="email" placeholder="البريد الإلكتروني">

  <input type="password" id="password" minlength="9" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
</div>

<script>
function login() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (name.length < 3) {
    alert("يجب أن يكون الاسم 3 أحرف على الأقل");
    return;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(email)) {
    alert("يرجى إدخال بريد إلكتروني صحيح");
    return;
  }

  const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{9,}$/;

  if (!passwordRegex.test(password)) {
    alert("كلمة المرور يجب أن تكون 9 خانات على الأقل وتحتوي على أحرف وأرقام");
    return;
  }

  localStorage.setItem("user", name);
  localStorage.setItem("email", email);

  alert("تم تسجيل الدخول بنجاح");
  window.location.href = "index.html";
}
</script>

</body>
</html>
